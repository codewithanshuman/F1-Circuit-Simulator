<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Circuit Simulator</title>
  <style>
    body { margin: 0; background: #1a1a1a; font-family: sans-serif; }
    #ui {
      display: flex; gap: 16px; align-items: center;
      padding: 12px 16px; color: #fff;
    }
    .stat {
      background: #2a2a2a; border: 1px solid #444;
      border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #aaa;
    }
    .stat span { font-weight: 600; font-size: 15px; color: #fff; margin-left: 6px; }
    button {
      padding: 6px 18px; border-radius: 8px;
      border: 1px solid #555; background: #2a2a2a;
      color: #fff; font-size: 13px; cursor: pointer;
    }
    button:hover { background: #3a3a3a; }
    canvas { display: block; }
  </style>
</head>
<body>

  <div id="ui">
    <div class="stat">Lap <span id="lap-count">0 / 19</span></div>
    <div class="stat">Sector <span id="sector-num">—</span></div>
    <div class="stat" id="sector-label">—</div>
    <button id="toggle-btn">Pause</button>
    <button id="reset-btn">Reset</button>
  </div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 680, H = 400;
    canvas.width = W; canvas.height = H;

    const TOTAL_LAPS = 19;

    const rawPoints = [
      [340,30],[420,30],[480,40],[520,70],[520,110],[490,140],
      [490,160],[530,180],[620,180],[640,200],[640,230],[620,250],
      [560,260],[530,280],[530,310],[550,340],[540,370],[510,380],
      [470,370],[460,340],[440,310],[390,310],[360,320],[340,350],
      [310,350],[280,330],[260,290],[270,250],[300,230],
      [320,220],[320,200],[290,180],[200,180],[160,160],
      [140,130],[150,90],[180,65],[230,40],[280,30],[340,30]
    ];

    function catmullRom(p0, p1, p2, p3, t) {
      const t2 = t*t, t3 = t2*t;
      return [
        0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
      ];
    }

    const path = [];
    const n = rawPoints.length - 1;
    for (let i = 0; i < n; i++) {
      const p0 = rawPoints[(i-1+n)%n];
      const p1 = rawPoints[i];
      const p2 = rawPoints[(i+1)%n];
      const p3 = rawPoints[(i+2)%n];
      for (let t = 0; t < 1; t += 0.04) {
        path.push(catmullRom(p0, p1, p2, p3, t));
      }
    }
    path.push(path[0]);

    const sectors = [
      { name: 'Sector 1 — Straight',    color: '#378ADD', start: 0.0,  end: 0.25 },
      { name: 'Sector 2 — Technical',   color: '#1D9E75', start: 0.25, end: 0.55 },
      { name: 'Sector 3 — High-speed',  color: '#D85A30', start: 0.55, end: 1.0  }
    ];

    const corners = [
      {t:0.07,label:'T1'},{t:0.14,label:'T2'},{t:0.20,label:'T3'},
      {t:0.28,label:'T4'},{t:0.36,label:'T5'},{t:0.45,label:'T6'},
      {t:0.54,label:'T7'},{t:0.62,label:'T8'},{t:0.70,label:'T9'},
      {t:0.78,label:'T10'},{t:0.86,label:'T11'},{t:0.93,label:'T12'}
    ];

    function ptAt(frac) {
      const idx = Math.floor(frac * (path.length - 1));
      return path[Math.min(idx, path.length - 1)];
    }

    function angleAt(frac) {
      const i = Math.floor(frac * (path.length - 1));
      const a = path[Math.max(i-1, 0)];
      const b = path[Math.min(i+1, path.length - 1)];
      return Math.atan2(b[1]-a[1], b[0]-a[0]);
    }

    function sectorOf(t) {
      for (let i = 0; i < sectors.length; i++) {
        if (t >= sectors[i].start && t < sectors[i].end) return i;
      }
      return sectors.length - 1;
    }

    let progress = 0, laps = 0, running = true, lastProgress = -0.01;
    const speed = 0.0008;

    function drawTrack() {
      ctx.clearRect(0, 0, W, H);
      const totalLen = path.length - 1;

      sectors.forEach(s => {
        const startIdx = Math.floor(s.start * totalLen);
        const endIdx   = Math.floor(s.end   * totalLen);

        ctx.beginPath();
        ctx.moveTo(path[startIdx][0], path[startIdx][1]);
        for (let i = startIdx+1; i <= endIdx; i++) ctx.lineTo(path[i][0], path[i][1]);
        ctx.strokeStyle = s.color + '55';
        ctx.lineWidth = 18;
        ctx.lineCap = ctx.lineJoin = 'round';
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(path[startIdx][0], path[startIdx][1]);
        for (let i = startIdx+1; i <= endIdx; i++) ctx.lineTo(path[i][0], path[i][1]);
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 3;
        ctx.stroke();
      });

      // Start/finish line
      const sf = path[0];
      const ang = angleAt(0);
      ctx.save();
      ctx.translate(sf[0], sf[1]);
      ctx.rotate(ang + Math.PI/2);
      for (let i = -2; i <= 2; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#fff' : '#333';
        ctx.fillRect(i*5 - 2.5, -12, 5, 24);
      }
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('S/F', sf[0], sf[1] - 18);

      // Corner labels
      corners.forEach(c => {
        const pt  = ptAt(c.t);
        const ang = angleAt(c.t);
        const nx  = Math.cos(ang + Math.PI/2) * 22;
        const ny  = Math.sin(ang + Math.PI/2) * 22;
        ctx.beginPath();
        ctx.arc(pt[0]+nx, pt[1]+ny, 10, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(30,30,30,0.85)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.fillStyle = '#eee';
        ctx.font = 'bold 9px sans-serif';
        ctx.fillText(c.label, pt[0]+nx, pt[1]+ny+3.5);
      });

      // Sector labels
      sectors.forEach((s, i) => {
        const mid = (s.start + s.end) / 2;
        const pt  = ptAt(mid);
        const ang = angleAt(mid);
        const nx  = Math.cos(ang - Math.PI/2) * 32;
        const ny  = Math.sin(ang - Math.PI/2) * 32;
        ctx.fillStyle = s.color;
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('S'+(i+1), pt[0]+nx, pt[1]+ny+3);
      });
    }

    function drawCar() {
      const t  = progress % 1;
      const pt = ptAt(t);
      const ang = angleAt(t);

      ctx.save();
      ctx.translate(pt[0], pt[1]);
      ctx.rotate(ang);

      ctx.fillStyle = '#CC0000';
      ctx.beginPath();
      ctx.moveTo(12, 0);
      ctx.lineTo(-8, -3);
      ctx.lineTo(-10, 0);
      ctx.lineTo(-8, 3);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.fillRect(-4, -1, 6, 2);

      ctx.fillStyle = '#222';
      ctx.fillRect(-9, -4, 4, 2);
      ctx.fillRect(-9,  2, 4, 2);
      ctx.fillRect( 4, -4, 4, 2);
      ctx.fillRect( 4,  2, 4, 2);

      ctx.restore();
    }

    function updateUI() {
      document.getElementById('lap-count').textContent = Math.min(laps, TOTAL_LAPS) + ' / ' + TOTAL_LAPS;
      const si = sectorOf(progress % 1);
      document.getElementById('sector-num').textContent = si + 1;
      document.getElementById('sector-label').textContent = sectors[si].name;
    }

    function loop() {
      if (running && laps < TOTAL_LAPS) {
        progress += speed;
        if (Math.floor(progress) > Math.floor(lastProgress)) laps = Math.floor(progress);
        lastProgress = progress;
      }

      drawTrack();
      drawCar();
      updateUI();

      if (laps >= TOTAL_LAPS) {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(W/2 - 110, H/2 - 30, 220, 60);
        ctx.fillStyle = '#CC0000';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Race complete! 🏁', W/2, H/2 + 7);
      }

      requestAnimationFrame(loop);
    }

    document.getElementById('toggle-btn').addEventListener('click', () => {
      running = !running;
      document.getElementById('toggle-btn').textContent = running ? 'Pause' : 'Resume';
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      progress = 0; laps = 0; lastProgress = -0.01; running = true;
      document.getElementById('toggle-btn').textContent = 'Pause';
    });

    loop();
  </script>

</body>
</html>
